# Canonical Refined Element service shape — §9.3 / §14.2
#
# A Lightning-gated shop where the L402 challenge is issued at /checkout/{id}
# but the fulfilment endpoint is at /orders/{id}/fulfil (the split-URL bug).
# See: https://refinedelement.com/blog/l402-broke-at-the-worst-possible-moment-here-s-what-we-learned
name: lightning-shop
domain_matches: "*.refinedelement.com"
flow:
  - challenge_path: "/checkout/*"
    fulfil_path_template: "/orders/{order_id}/fulfil"
    id_extractor: "path:checkout/([^/]+)"
